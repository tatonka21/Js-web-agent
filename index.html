<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <title>T’s Autonomous Agent</title>
  <style>
    body { font-family: Arial; padding: 20px; background: #111; color: #eee; }
    #log { white-space: pre-wrap; background: #222; padding: 10px; border-radius: 6px; height: 300px; overflow-y: scroll; }
    input, button, textarea { width: 100%; margin-top: 10px; padding: 8px; border-radius: 6px; border: none; }
    button { background: #4caf50; color: white; cursor: pointer; }
    button:hover { background: #45a049; }
  </style>
  <link rel="modulepreload" href="https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/lib/index.js" integrity="sha384-2Tjus67Z6N7N+ljqQWnpSEcinnggT4SKOBml1BGnUXSbSGg7q1FgUxJOnIKyn0W4" crossorigin="anonymous" />
</head>
<body>

<h1>🤖 T’s Autonomous Browser Agent</h1>

<p>This agent runs fully in the browser using a local WebLLM model (first load may take a minute).</p>

<label for="goal">Goal for the agent:</label>
<textarea id="goal" rows="3" placeholder="Example: Improve README.md in my repo"></textarea>

<label for="token">GitHub Token (fine-grained):</label>
<input id="token" type="password" placeholder="ghp_..." />

<label>Repository (owner/repo):</label>
<input id="repo" placeholder="username/repo" />

<button onclick="startAgent()">Start Agent</button>

<h2>Agent Log</h2>
<div id="log"></div>

<script type="module">
  import * as webllm from "https://cdn.jsdelivr.net/npm/@mlc-ai/web-llm@0.2.82/lib/index.js";
  window.webllm = webllm;
</script>
<script src="config.js" defer></script>
<script src="tools.js" defer></script>
<script src="agent.js" defer></script>
<script src="ui.js" defer></script>

</body>
</html>
